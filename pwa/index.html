<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1a7a3c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="My Schedule"/>
  <title>Master Schedule</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icons/icon-192.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'IBM Plex Mono', 'Courier New', monospace; background: #0d1117; color: #e6edf3; overscroll-behavior: none; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #2ea043; border-radius: 3px; }
    .cell-hover:hover { filter: brightness(1.2); }
    .cell-hover:active { transform: scale(0.96); }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; color: #000 !important; }
      td, th { border: 1px solid #ccc !important; font-size: 7px !important; padding: 2px !important; }
      .section-hdr { background: #eee !important; color: #000 !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ─── THEME ───────────────────────────────────────────────────────────────────
const THEMES = {
  dark:  { bg:"#0d1117", surface:"#161b22", border:"#21262d", text:"#e6edf3", muted:"#6e7681", hdr:"linear-gradient(135deg,#1a7a3c,#0a3318)", accent:"#2ea043" },
  light: { bg:"#f6f8fa", surface:"#ffffff", border:"#d0d7de", text:"#1f2328", muted:"#656d76", hdr:"linear-gradient(135deg,#2ea043,#1a7a3c)", accent:"#1a7a3c" },
};

// ─── COLOURS ─────────────────────────────────────────────────────────────────
const C = {
  PHY:         { bg:"#1565c0", text:"#fff", prog:"ECP" },
  ISC153:      { bg:"#2e7d32", text:"#fff", prog:"ECP" },
  MAM151:      { bg:"#bf360c", text:"#fff", prog:"ECP" },
  PRAC:        { bg:"#6a1b9a", text:"#fff", prog:"ECP" },
  TUT:         { bg:"#880e4f", text:"#fff", prog:"ECP" },
  STUDY_ECP:   { bg:"#1b3d6e", text:"#90caf9", prog:"ECP" },
  MAT1503:     { bg:"#0277bd", text:"#fff", prog:"UNISA" },
  MAT1512:     { bg:"#0288d1", text:"#fff", prog:"UNISA" },
  MAT1513:     { bg:"#039be5", text:"#fff", prog:"UNISA" },
  STA1501:     { bg:"#00695c", text:"#fff", prog:"UNISA" },
  STA1502:     { bg:"#00796b", text:"#fff", prog:"UNISA" },
  STA1503:     { bg:"#00897b", text:"#fff", prog:"UNISA" },
  COS1511:     { bg:"#37474f", text:"#fff", prog:"UNISA" },
  COS1512:     { bg:"#455a64", text:"#fff", prog:"UNISA" },
  INF1511:     { bg:"#4e342e", text:"#fff", prog:"UNISA" },
  ALX:         { bg:"#e65100", text:"#fff", prog:"ALX" },
  AWS:         { bg:"#ff6f00", text:"#fff", prog:"AWS" },
  CERT:        { bg:"#33691e", text:"#fff", prog:"CERT" },
  SLEEP:       { bg:"#1a1a2e", text:"#333", prog:"LIFE" },
  LUNCH:       { bg:"#2a2a2a", text:"#777", prog:"LIFE" },
  TRAVEL:      { bg:"#3e2723", text:"#a1887f", prog:"LIFE" },
  FREE:        { bg:"#7f0000", text:"#ef9a9a", prog:"LIFE" },
};

const EM = {
  PHY:"⚛️", ISC153:"🔬", MAM151:"📐", PRAC:"🧪", TUT:"📝", STUDY_ECP:"📖",
  MAT1503:"∑", MAT1512:"∫", MAT1513:"∂",
  STA1501:"📊", STA1502:"📈", STA1503:"🎲",
  COS1511:"💻", COS1512:"⌨️", INF1511:"🖥️",
  ALX:"🌍", AWS:"☁️", CERT:"🎯",
  SLEEP:"💤", LUNCH:"🍽️", TRAVEL:"🚌", FREE:"🎮",
};

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const LIFE = ["SLEEP","TRAVEL","LUNCH","FREE"];
const mk = (t,l) => ({type:t,label:l});

// ─── SCHEDULE ────────────────────────────────────────────────────────────────
const SLOTS_NOW = [
  {time:"05:00–06:00",sec:"EARLY", Mon:mk("MAT1512","MAT1512"),Tue:mk("COS1511","COS1511"),Wed:mk("MAT1503","MAT1503"),Thu:mk("STA1501","STA1501"),Fri:mk("COS1512","COS1512"),Sat:mk("SLEEP","Rest"),Sun:mk("SLEEP","Rest")},
  {time:"06:00–08:15",sec:"EARLY", Mon:mk("TRAVEL","Commute"),Tue:mk("TRAVEL","Commute"),Wed:mk("TRAVEL","Commute"),Thu:mk("TRAVEL","Commute"),Fri:mk("TRAVEL","Commute"),Sat:mk("MAT1513","MAT1513"),Sun:mk("STA1502","STA1502")},
  {time:"08:30–09:15",sec:"ECP",   Mon:mk("PHY","Grp1 PHY"),Tue:mk("PHY","Grp1 PHY"),Wed:mk("PHY","Grp1 PHY"),Thu:mk("FREE","—"),Fri:mk("PHY","Grp2 PHY"),Sat:mk("STA1503","STA1503"),Sun:mk("INF1511","INF1511")},
  {time:"09:25–10:10",sec:"ECP",   Mon:mk("ISC153","Grp3&4 ISC153"),Tue:mk("PHY","Grp2 PHY+ISC"),Wed:mk("PHY","Grp2 PHY+ISC"),Thu:mk("ISC153","Grp2 ISC153"),Fri:mk("ISC153","Grp1&2 ISC+MAM"),Sat:mk("COS1511","COS1511"),Sun:mk("MAT1503","MAT1503")},
  {time:"10:20–11:05",sec:"ECP",   Mon:mk("MAM151","ISC153+MAM"),Tue:mk("MAM151","ISC153+MAM"),Wed:mk("ISC153","ISC153+MAM"),Thu:mk("PHY","PHY+ISC Grp4"),Fri:mk("ISC153","Grp3&4 ISC"),Sat:mk("STA1501","STA1501"),Sun:mk("STA1502","STA1502")},
  {time:"11:15–12:00",sec:"ECP",   Mon:mk("MAM151","Grp1&2 MAM"),Tue:mk("ISC153","Grp3&4 ISC"),Wed:mk("PHY","Grp1 PHY"),Thu:mk("PHY","Grp2 PHY"),Fri:mk("PHY","Grp2 PHY"),Sat:mk("STA1503","STA1503"),Sun:mk("FREE","Rest ⛪")},
  {time:"12:10–13:00",sec:"CERT",  Mon:mk("CERT","AWS CLF"),Tue:mk("CERT","AWS CLF"),Wed:mk("CERT","Sec+ prep"),Thu:mk("CERT","AWS CLF"),Fri:mk("CERT","Flashcards"),Sat:mk("LUNCH","Lunch"),Sun:mk("FREE","Free")},
  {time:"13:00–14:00",sec:"BREAK", Mon:mk("LUNCH","Lunch"),Tue:mk("LUNCH","Lunch"),Wed:mk("LUNCH","Lunch"),Thu:mk("LUNCH","Lunch"),Fri:mk("LUNCH","Lunch"),Sat:mk("COS1512","COS1512"),Sun:mk("INF1511","INF1511")},
  {time:"14:00–14:45",sec:"ECP",   Mon:mk("PRAC","Grp2 PHY PRAC"),Tue:mk("MAM151","Grp1&2 MAM"),Wed:mk("PRAC","Grp1 PHY PRAC"),Thu:mk("PRAC","Grp3&4 ISC PRAC"),Fri:mk("TUT","Grp1&2 Tut"),Sat:mk("MAT1503","MAT1503"),Sun:mk("ALX","ALX catchup")},
  {time:"14:55–15:40",sec:"ECP",   Mon:mk("PRAC","Grp2 PHY PRAC"),Tue:mk("MAM151","Grp1&2 MAM"),Wed:mk("PRAC","Grp1 PHY PRAC"),Thu:mk("PRAC","Grp3&4 ISC PRAC"),Fri:mk("TUT","Grp1&2 Tut"),Sat:mk("MAT1512","MAT1512"),Sun:mk("ALX","ALX catchup")},
  {time:"15:40–16:30",sec:"ECP",   Mon:mk("PRAC","Grp2 PHY PRAC"),Tue:mk("MAM151","Grp1&2 MAM"),Wed:mk("PRAC","Grp1 PHY PRAC"),Thu:mk("PRAC","Grp3&4 ISC PRAC"),Fri:mk("TUT","Grp1&2 Tut"),Sat:mk("STA1501","STA1501"),Sun:mk("FREE","Gaming 🎮")},
  {time:"16:30–18:00",sec:"BREAK", Mon:mk("TRAVEL","Commute"),Tue:mk("TRAVEL","Commute"),Wed:mk("TRAVEL","Commute"),Thu:mk("TRAVEL","Commute"),Fri:mk("FREE","Friday 🎉"),Sat:mk("FREE","Chill"),Sun:mk("FREE","Prep week")},
  {time:"18:00–19:00",sec:"EVE",   Mon:mk("ALX","ALX Foundations"),Tue:mk("ALX","ALX Foundations"),Wed:mk("ALX","ALX Foundations"),Thu:mk("ALX","ALX Foundations"),Fri:mk("FREE","Off 🎉"),Sat:mk("STA1502","STA1502"),Sun:mk("STUDY_ECP","ECP PHY review")},
  {time:"19:00–20:00",sec:"EVE",   Mon:mk("ALX","ALX Foundations"),Tue:mk("ALX","ALX Foundations"),Wed:mk("ALX","ALX Foundations"),Thu:mk("ALX","ALX Foundations"),Fri:mk("FREE","Off 🎉"),Sat:mk("STA1503","STA1503"),Sun:mk("STUDY_ECP","ECP MAM review")},
  {time:"20:00–20:30",sec:"BREAK", Mon:mk("FREE","Break"),Tue:mk("FREE","Break"),Wed:mk("FREE","Break"),Thu:mk("FREE","Break"),Fri:mk("FREE","Off 🎉"),Sat:mk("FREE","Break"),Sun:mk("FREE","Break")},
  {time:"20:30–21:30",sec:"LATE",  Mon:mk("STUDY_ECP","ECP PHY"),Tue:mk("STUDY_ECP","ECP ISC153"),Wed:mk("STUDY_ECP","ECP MAM151"),Thu:mk("STUDY_ECP","ECP PHY probs"),Fri:mk("FREE","Off 🎉"),Sat:mk("COS1511","COS1511"),Sun:mk("MAT1513","MAT1513")},
  {time:"21:30–22:30",sec:"LATE",  Mon:mk("MAT1512","MAT1512"),Tue:mk("COS1511","COS1511"),Wed:mk("STA1501","STA1501"),Thu:mk("MAT1503","MAT1503"),Fri:mk("FREE","Off 🎉"),Sat:mk("INF1511","INF1511"),Sun:mk("MAT1503","Review")},
  {time:"22:30–23:30",sec:"LATE",  Mon:mk("COS1512","COS1512"),Tue:mk("STA1502","STA1502"),Wed:mk("MAT1513","MAT1513"),Thu:mk("COS1512","COS1512"),Fri:mk("SLEEP","Sleep 💤"),Sat:mk("SLEEP","Sleep"),Sun:mk("SLEEP","Sleep")},
  {time:"23:30–05:00",sec:"SLEEP", Mon:mk("SLEEP","💤"),Tue:mk("SLEEP","💤"),Wed:mk("SLEEP","💤"),Thu:mk("SLEEP","💤"),Fri:mk("SLEEP","💤"),Sat:mk("SLEEP","💤"),Sun:mk("SLEEP","💤")},
];

const SLOTS_AWS = SLOTS_NOW.map(s => {
  if (s.sec !== "EVE") return s;
  const n = {...s};
  DAYS.forEach(d => { if (n[d]?.type==="ALX") n[d]=mk("AWS","AWS re/Start"); });
  return n;
});

const SECS = { EARLY:"🌅 Early Morning", ECP:"🎓 ECP Classes", CERT:"🎯 Cert Prep", BREAK:"☕ Break", EVE:"🌆 Evening", LATE:"🌙 Late Study", SLEEP:"😴 Sleep" };

const UNISA_MODS = [
  {id:"MAT1503",name:"Linear Algebra I",sem:1,color:"#0277bd"},
  {id:"MAT1512",name:"Calculus A",sem:1,color:"#0288d1"},
  {id:"MAT1513",name:"Calculus B",sem:2,color:"#039be5"},
  {id:"STA1501",name:"Descriptive Stats",sem:1,color:"#00695c"},
  {id:"STA1502",name:"Stat Inference",sem:2,color:"#00796b"},
  {id:"STA1503",name:"Distribution Theory",sem:2,color:"#00897b"},
  {id:"COS1511",name:"Programming I",sem:1,color:"#37474f"},
  {id:"COS1512",name:"Programming II",sem:2,color:"#455a64"},
  {id:"INF1511",name:"Visual Programming",sem:1,color:"#4e342e"},
];

const FILTERS = [
  {key:"ALL",label:"All",match:()=>true},
  {key:"ECP",label:"ECP",match:t=>C[t]?.prog==="ECP"},
  {key:"UNISA",label:"UNISA",match:t=>C[t]?.prog==="UNISA"},
  {key:"ALX",label:"ALX",match:t=>t==="ALX"},
  {key:"AWS",label:"AWS",match:t=>t==="AWS"},
  {key:"CERT",label:"Cert",match:t=>t==="CERT"},
];

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const STORE = "schedule_pwa_v1";
const load = () => { try { return JSON.parse(localStorage.getItem(STORE)||"{}"); } catch { return {}; } };
const save = (s) => { try { localStorage.setItem(STORE, JSON.stringify(s)); } catch {} };

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [theme, setTheme]   = useState("dark");
  const [filter, setFilter] = useState("ALL");
  const [era, setEra]       = useState("NOW");
  const [checked, setChecked] = useState(load);
  const [showToday, setShowToday] = useState(true);
  const [showMods, setShowMods]   = useState(false);
  const [collapsed, setCollapsed] = useState({SLEEP:true});
  const [todayIdx, setTodayIdx]   = useState(() => { const d=new Date().getDay(); return d===0?6:d-1; });

  const T = THEMES[theme];
  const isDark = theme==="dark";
  const slots = era==="NOW" ? SLOTS_NOW : SLOTS_AWS;
  const fObj  = FILTERS.find(f=>f.key===filter);

  // Programme hours
  const progHrs = useMemo(() => {
    const h={ECP:0,UNISA:0,ALX:0,AWS:0,CERT:0};
    slots.forEach(s=>{ if(s.sec==="SLEEP") return; DAYS.forEach(d=>{ const p=C[s[d]?.type]?.prog; if(p&&h[p]!==undefined) h[p]++; }); });
    return h;
  }, [slots]);

  // Module hours
  const modHrs = useMemo(() => {
    const h={}; UNISA_MODS.forEach(m=>{h[m.id]=0;});
    slots.forEach(s=>{ if(s.sec==="SLEEP") return; DAYS.forEach(d=>{ const t=s[d]?.type; if(t&&h[t]!==undefined) h[t]++; }); });
    return h;
  }, [slots]);

  const weekKey = useMemo(() => { const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().slice(0,10); }, []);
  const ck = (time,day) => `${weekKey}__${time}__${day}`;

  const toggle = useCallback((k) => {
    setChecked(p => { const n={...p,[k]:!p[k]}; save(n); return n; });
  }, []);

  const weekReset = () => { const n={}; save(n); setChecked(n); };

  // Today
  const todayDay = DAYS[todayIdx];
  const todayBlocks = useMemo(() =>
    slots.filter(s=>s[todayDay]&&!LIFE.includes(s[todayDay].type)&&s.sec!=="SLEEP")
         .map(s=>({time:s.time,...s[todayDay],k:ck(s.time,todayDay)}))
  , [slots,todayDay,weekKey]);

  const doneCount = todayBlocks.filter(b=>checked[b.k]).length;
  const pct = todayBlocks.length ? Math.round((doneCount/todayBlocks.length)*100) : 0;
  const loadInfo = todayBlocks.length>=10?["🔥 Heavy",  "#ff7b72"]
                 : todayBlocks.length>=6 ?["⚡ Solid",  "#f0883e"]
                 :                        ["✅ Light",  "#3fb950"];

  const isVisible = (type) => filter==="ALL" || fObj.match(type) || LIFE.includes(type);

  // Pre-compute rows
  const rows = useMemo(() => {
    const out=[]; let last=null;
    slots.forEach(slot => {
      if(slot.sec!==last){ out.push({type:"sec",sec:slot.sec}); last=slot.sec; }
      out.push({type:"slot",slot});
    });
    return out;
  }, [slots]);

  const btn = (label, onClick, extra={}) => (
    <button onClick={onClick} style={{
      fontFamily:"inherit", background:"rgba(255,255,255,0.13)", color:"#fff",
      border:"1px solid rgba(255,255,255,0.25)", borderRadius:20,
      padding:"4px 12px", fontSize:10, fontWeight:800, cursor:"pointer",
      ...extra,
    }}>{label}</button>
  );

  return (
    <div style={{background:T.bg, minHeight:"100vh", padding:"12px 10px", color:T.text, transition:"background 0.3s,color 0.3s"}}>

      {/* HEADER */}
      <div style={{background:T.hdr, borderRadius:14, padding:"14px 16px", marginBottom:10, border:`1px solid ${T.accent}`}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8}}>
          <div>
            <div style={{fontSize:15, fontWeight:900, color:"#fff", letterSpacing:0.5}}>🗓️ MASTER SCHEDULE</div>
            <div style={{fontSize:8.5, color:"rgba(255,255,255,0.55)", marginTop:2}}>ECP · UNISA×9 · ALX · AWS · Cert</div>
          </div>
          <div style={{display:"flex", gap:5, flexWrap:"wrap"}} className="no-print">
            {btn(era==="NOW"?"📅 Now":"☁️ AWS", ()=>setEra(e=>e==="NOW"?"AWS":"NOW"))}
            {btn(isDark?"☀️":"🌙", ()=>setTheme(t=>t==="dark"?"light":"dark"))}
            {btn("🖨️", ()=>window.print())}
            {btn("🔄 Reset", weekReset, {background:"rgba(200,0,0,0.2)", borderColor:"rgba(255,100,100,0.4)", color:"#ffb3b3"})}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"flex", gap:7, marginTop:11, flexWrap:"wrap"}}>
          {[["ECP",progHrs.ECP,"#58a6ff"],["UNISA",progHrs.UNISA,"#3fb950"],["ALX",progHrs.ALX,"#f0883e"],["AWS",progHrs.AWS,"#ffa657"],["CERT",progHrs.CERT,"#a5d6ff"],["TOTAL",Object.values(progHrs).reduce((a,b)=>a+b,0),"#ff7b72"]].map(([l,v,c])=>(
            <div key={l} style={{textAlign:"center", background:"rgba(0,0,0,0.3)", borderRadius:8, padding:"5px 10px", minWidth:48}}>
              <div style={{fontSize:17, fontWeight:900, color:c}}>{v}</div>
              <div style={{fontSize:7, color:"rgba(255,255,255,0.45)"}}>{l}/WK</div>
            </div>
          ))}
        </div>
      </div>

      {/* UNISA MODULE TRACKER */}
      <div style={{marginBottom:10}} className="no-print">
        <button onClick={()=>setShowMods(p=>!p)} style={{
          fontFamily:"inherit", width:"100%", background:T.surface, color:T.text,
          border:`1px solid ${T.border}`, borderRadius:showMods?"10px 10px 0 0":10,
          padding:"8px 12px", fontSize:10, fontWeight:800, cursor:"pointer", textAlign:"left",
        }}>
          📚 UNISA Module Tracker {showMods?"▲":"▼"}
          <span style={{fontSize:8.5, color:T.muted, float:"right", fontWeight:400}}>
            {UNISA_MODS.filter(m=>modHrs[m.id]>0).length}/9 scheduled
          </span>
        </button>
        {showMods && (
          <div style={{background:T.surface, border:`1px solid ${T.border}`, borderTop:"none", borderRadius:"0 0 10px 10px", padding:"10px 12px"}}>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))", gap:7}}>
              {UNISA_MODS.map(m=>{
                const h=modHrs[m.id]||0;
                const warn=h===0; const ok=h>=3;
                return (
                  <div key={m.id} style={{background:warn?(isDark?"#2d1010":"#fff5f5"):T.bg, border:`1px solid ${warn?"#ff4444":ok?"#2ea043":T.border}`, borderRadius:7, padding:"7px 9px"}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div style={{fontSize:10, fontWeight:900, color:m.color}}>{m.id}</div>
                      <div style={{fontSize:8.5, fontWeight:700, color:warn?"#ff7b72":ok?"#3fb950":T.muted}}>{h}h {warn?"⚠️":ok?"✅":""}</div>
                    </div>
                    <div style={{fontSize:8, color:T.muted, margin:"2px 0 5px"}}>{m.name}</div>
                    <div style={{background:isDark?"#21262d":"#e0e0e0", borderRadius:3, height:4, overflow:"hidden"}}>
                      <div style={{background:m.color, width:`${Math.min((h/5)*100,100)}%`, height:"100%", transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:7, color:T.muted, marginTop:2}}>Sem {m.sem} · ≥3h/wk</div>
                  </div>
                );
              })}
            </div>
            {UNISA_MODS.some(m=>!modHrs[m.id]) && (
              <div style={{marginTop:8, fontSize:9, color:"#ff7b72", fontWeight:700}}>
                ⚠️ 0h: {UNISA_MODS.filter(m=>!modHrs[m.id]).map(m=>m.id).join(", ")}
              </div>
            )}
          </div>
        )}
      </div>

      {/* TODAY CARD */}
      {showToday ? (
        <div style={{background:T.surface, borderRadius:12, padding:"11px 13px", marginBottom:10, border:`1px solid ${T.border}`}} className="no-print">
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, flexWrap:"wrap", gap:5}}>
            <div style={{display:"flex", alignItems:"center", gap:8}}>
              <span style={{fontSize:12, fontWeight:900, color:"#f0883e"}}>📌 {DAY_FULL[todayIdx]}</span>
              <span style={{fontSize:9, color:loadInfo[1], fontWeight:700}}>{loadInfo[0]}</span>
            </div>
            <div style={{display:"flex", gap:3, flexWrap:"wrap", alignItems:"center"}}>
              <span style={{fontSize:8, color:T.muted}}>{doneCount}/{todayBlocks.length} · {pct}%</span>
              {DAYS.map((d,i)=>(
                <button key={d} onClick={()=>setTodayIdx(i)} style={{
                  fontFamily:"inherit", background:todayIdx===i?"#f0883e":isDark?"#21262d":"#e0e0e0",
                  color:todayIdx===i?"#fff":T.muted, border:"none",
                  borderRadius:5, padding:"2px 7px", fontSize:8.5, fontWeight:700, cursor:"pointer",
                }}>{d}</button>
              ))}
              <button onClick={()=>setShowToday(false)} style={{background:"transparent",color:T.muted,border:"none",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>✕</button>
            </div>
          </div>

          <div style={{display:"flex", gap:5, flexWrap:"wrap"}}>
            {todayBlocks.length===0
              ? <span style={{color:T.muted,fontSize:10}}>🎉 Free day ntwana!</span>
              : todayBlocks.map(b=>{
                  const done=checked[b.k]; const col=C[b.type];
                  return (
                    <div key={b.k} onClick={()=>toggle(b.k)} style={{
                      background:done?(isDark?"#21262d":"#e8e8e8"):col?.bg,
                      color:done?T.muted:col?.text,
                      borderRadius:7, padding:"5px 10px", cursor:"pointer",
                      textDecoration:done?"line-through":"none",
                      opacity:done?0.5:1, transition:"all 0.15s",
                      fontSize:10, fontWeight:700,
                      border:`1px solid ${done?T.border:col?.bg||T.border}`,
                    }}>
                      {done?"✅ ":(EM[b.type]||"")+" "}{b.time.split("–")[0]} {b.label}
                    </div>
                  );
                })
            }
          </div>

          {todayBlocks.length>0 && (
            <div style={{marginTop:8}}>
              <div style={{background:isDark?"#21262d":"#e0e0e0", borderRadius:4, height:6, overflow:"hidden"}}>
                <div style={{
                  background:pct===100?"linear-gradient(90deg,#2ea043,#56d364)":pct>=60?"linear-gradient(90deg,#f0883e,#ffa657)":"linear-gradient(90deg,#ff7b72,#f0883e)",
                  width:`${pct}%`, height:"100%", transition:"width 0.3s"
                }}/>
              </div>
              <div style={{fontSize:8, color:pct===100?"#3fb950":T.muted, marginTop:3, fontWeight:pct===100?800:400}}>
                {pct===100?"🏆 Day complete! Sharp ntwana 💪":`${pct}% done`}
              </div>
            </div>
          )}
        </div>
      ) : (
        <button onClick={()=>setShowToday(true)} className="no-print" style={{
          fontFamily:"inherit", background:T.surface, color:"#f0883e",
          border:"1px solid #f0883e", borderRadius:8, padding:"5px 12px",
          fontSize:9, fontWeight:800, cursor:"pointer", marginBottom:10, display:"block",
        }}>📌 Show Today</button>
      )}

      {/* FILTERS */}
      <div style={{display:"flex", gap:4, marginBottom:8, flexWrap:"wrap"}} className="no-print">
        {FILTERS.map(f=>(
          <button key={f.key} onClick={()=>setFilter(f.key)} style={{
            fontFamily:"inherit",
            background:filter===f.key?"#238636":T.surface,
            color:filter===f.key?"#fff":T.muted,
            border:`1px solid ${filter===f.key?"#2ea043":T.border}`,
            borderRadius:20, padding:"3px 12px", fontSize:10, fontWeight:700, cursor:"pointer",
          }}>{f.label}</button>
        ))}
      </div>

      {/* LEGEND */}
      <div style={{display:"flex", gap:3, marginBottom:10, flexWrap:"wrap"}} className="no-print">
        {Object.entries(C).filter(([k])=>!LIFE.includes(k)).map(([k,c])=>(
          <div key={k} style={{
            background:c.bg, color:c.text, borderRadius:3,
            padding:"2px 7px", fontSize:8, fontWeight:800,
            opacity:filter==="ALL"||fObj.match(k)?1:0.15, transition:"opacity 0.2s",
          }}>{EM[k]} {k}</div>
        ))}
      </div>

      {/* TABLE */}
      <div style={{overflowX:"auto", WebkitOverflowScrolling:"touch"}}>
        <table style={{width:"100%", borderCollapse:"collapse", minWidth:560}}>
          <thead>
            <tr>
              <th style={{background:isDark?"#161b22":"#e8f5e9", color:isDark?"#58a6ff":"#1a7a3c", padding:"7px 8px", fontSize:9.5, fontWeight:800, textAlign:"left", border:`1px solid ${T.border}`, width:90, whiteSpace:"nowrap"}}>TIME</th>
              {DAYS.map((d,i)=>(
                <th key={d} style={{
                  background:i===todayIdx?(isDark?"#162316":"#d4f5d4"):["Sat","Sun"].includes(d)?(isDark?"#1a1e2e":"#e8eaf6"):isDark?"#161b22":"#f0f6ff",
                  color:i===todayIdx?"#3fb950":["Sat","Sun"].includes(d)?(isDark?"#f0883e":"#5c6bc0"):isDark?"#3fb950":"#1a7a3c",
                  padding:"7px 3px", fontSize:10.5, fontWeight:900, textAlign:"center", border:`1px solid ${T.border}`,
                }}>
                  {d}
                  {i===todayIdx&&<div style={{fontSize:7,color:"#3fb950",marginTop:1}}>▲</div>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row,ri)=>{
              if(row.type==="sec"){
                const coll=collapsed[row.sec];
                return (
                  <tr key={`s${ri}`}>
                    <td colSpan={8} className="section-hdr" onClick={()=>setCollapsed(p=>({...p,[row.sec]:!p[row.sec]}))} style={{
                      background:isDark?"#0a0f0a":"#eafbee", color:isDark?"#3fb950":"#1a7a3c",
                      padding:"5px 10px", fontSize:9, fontWeight:800, letterSpacing:1,
                      borderTop:`2px solid ${T.border}`, cursor:"pointer", userSelect:"none",
                    }}>
                      {coll?"▶":"▼"} {SECS[row.sec]}
                      <span style={{float:"right",fontSize:7.5,opacity:0.5}}>{coll?"expand":"collapse"}</span>
                    </td>
                  </tr>
                );
              }
              const {slot}=row;
              if(collapsed[slot.sec]) return null;
              const isSleep=slot.sec==="SLEEP";
              return (
                <tr key={slot.time} style={{opacity:isSleep?0.2:1}}>
                  <td style={{background:isDark?"#0d1117":T.surface, padding:"5px 6px", fontSize:8.5, color:T.muted, border:`1px solid ${T.border}`, fontWeight:700, whiteSpace:"nowrap"}}>{slot.time}</td>
                  {DAYS.map((d,di)=>{
                    const cell=slot[d];
                    if(!cell) return <td key={d} style={{border:`1px solid ${T.border}`,background:isDark?"#0d1117":T.bg}}/>;
                    const {type,label}=cell;
                    const col=C[type];
                    const vis=isVisible(type);
                    const isLife=LIFE.includes(type);
                    const k=ck(slot.time,d);
                    const done=checked[k];
                    const isToday=di===todayIdx;
                    return (
                      <td key={d}
                        onClick={()=>vis&&!isLife&&!isSleep&&toggle(k)}
                        className={vis&&!isLife&&!isSleep?"cell-hover":""}
                        style={{
                          border:`1px solid ${isToday?(isDark?"#3fb95055":"#2ea04344"):T.border}`,
                          background:!vis?(isDark?"#0d1117":T.bg):done?(isDark?"#151515":"#efefef"):isSleep?(isDark?"#090909":"#f9f9f9"):col?.bg||T.surface,
                          padding:"4px 2px", textAlign:"center", verticalAlign:"middle",
                          cursor:vis&&!isLife&&!isSleep?"pointer":"default",
                          transition:"background 0.12s", minWidth:65,
                        }}>
                        {vis&&!isSleep&&(
                          <div style={{color:done?(isDark?"#444":"#aaa"):col?.text||T.text, fontSize:9, fontWeight:800, lineHeight:1.4, textDecoration:done?"line-through":"none", opacity:done?0.35:1}}>
                            {!isLife&&<div style={{fontSize:10}}>{done?"✅":EM[type]||""}</div>}
                            <div style={{fontSize:8}}>{label}</div>
                          </div>
                        )}
                        {vis&&isSleep&&<div style={{color:isDark?"#1f1f1f":"#ddd",fontSize:10}}>💤</div>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* FOOTER */}
      <div style={{marginTop:12, background:T.surface, borderRadius:10, padding:"10px 13px", border:`1px solid ${T.border}`, fontSize:9, color:T.muted, lineHeight:1.9}} className="no-print">
        <b style={{color:"#f0883e"}}>⚠️ AWS re/Start</b> starts <b style={{color:"#58a6ff"}}>28 Apr 2026</b> — tap phase toggle above. ·
        <b style={{color:"#3fb950"}}> 💡 Overlap:</b> UNISA MAT+STA = ECP MAM151+ISC153 prep. ·
        Tap any block to mark done. Tap section headers to collapse. ·
        <b style={{color:"#3fb950"}}> Sharp ntwana 💪</b>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(r => console.log("SW registered"))
      .catch(e => console.log("SW failed:", e));
  });
}
</script>
</body>
</html>
